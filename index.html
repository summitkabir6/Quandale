<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUANDALE DINGLE - Sigma Homework Explainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Comic+Neue:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MEME FLASH OVERLAY -->
  <div class="meme-flash" id="memeFlash">
    <div class="meme-flash-bg"></div>
    <img id="memeImg" src="" alt="meme" />
  </div>

  <div class="page-wrap">

    <!-- TITLE CARD -->
    <div class="card card--title">
      <span class="quandale-face">🗿</span>
      <div class="title-main">QUANDALE DINGLE</div>
      <div class="title-sub">Sigma Homework Explainer</div>
      <div class="subtitle-tag">Powered by Skibidi Science</div>
    </div>

    <!-- INPUT CARD -->
    <div class="card card--input">
      <label class="card-label card-label--green">[ DROP YOUR HOMEWORK FR FR ]</label>
      <div class="upload-zone" id="imageUploadZone">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <div id="uploadPrompt">
          <div class="upload-icon">📸</div>
          <div class="upload-text">DROP YOUR HOMEWORK HERE</div>
          <div class="upload-sub">or click to upload</div>
        </div>
        <img id="imagePreview" src="" alt="homework preview" style="display:none">
      </div>
      <input type="text" class="context-input" id="contextInput" placeholder="any extra context? (optional)">
      <div class="btn-row">
        <button class="btn btn-translate" id="translateBtn">🗿 EXPLAIN THIS SLOP</button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status" id="status"></div>

    <!-- OUTPUT CARD -->
    <div class="card card--output" id="outputSection">
      <label class="card-label card-label--pink">[ QUANDALE'S EXPLANATION NO CAP ]</label>
      <div class="output-text" id="outputText"></div>
      <div class="btn-row">
        <button class="btn btn-speak" id="speakBtn">🔊 READ IT OUT LOUD</button>
        <button class="btn btn-copy" id="copyBtn">📋 COPY</button>
      </div>
    </div>

  </div>

  <footer>
    QUANDALE DINGLE © 2025 — ALL SIGMA ACADEMIC RIGHTS RESERVED 🗿
  </footer>

  <script src="app.js"></script>
</body>
</html>
