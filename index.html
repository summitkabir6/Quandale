<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUANDALE DINGLE - Corporate Brainrot Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Comic+Neue:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MEME FLASH OVERLAY -->
  <div class="meme-flash" id="memeFlash">
    <div class="meme-flash-bg"></div>
    <img id="memeImg" src="" alt="meme" />
  </div>

  <div class="page-wrap">

    <!-- TITLE CARD -->
    <div class="card card--title">
      <span class="quandale-face">🗿</span>
      <div class="title-main">QUANDALE DINGLE</div>
      <div class="title-sub">Corporate Brainrot Translator</div>
      <div class="subtitle-tag">Powered by Absolute Delusion</div>
    </div>

    <!-- INPUT CARD -->
    <div class="card card--input">
      <label class="card-label card-label--green" for="inputText">[ DROP YOUR CORPORATE SLOP ]</label>
      <textarea id="inputText" placeholder="Paste your corporate drivel here... synergize the paradigm, leverage stakeholder alignment, circle back offline..."></textarea>
      <div class="btn-row">
        <button class="btn btn-mic" id="micBtn">🎤 SPEAK</button>
        <button class="btn btn-translate" id="translateBtn">🗿 TRANSLATE THIS SLOP</button>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status" id="status"></div>

    <!-- OUTPUT CARD -->
    <div class="card card--output" id="outputSection">
      <label class="card-label card-label--pink">[ BRAINROT OUTPUT ]</label>
      <div class="output-text" id="outputText"></div>
      <div class="btn-row">
        <button class="btn btn-speak" id="speakBtn">🔊 READ IT OUT LOUD</button>
        <button class="btn btn-copy" id="copyBtn">📋 COPY</button>
      </div>
    </div>

  </div>

  <footer>
    QUANDALE DINGLE © 2025 — ALL SIGMA RIGHTS RESERVED — NO CAP 🗿
  </footer>

  <script src="app.js"></script>
</body>
</html>
